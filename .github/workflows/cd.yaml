name: CD

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'out/**' # Prevents infinite loop when the action commits its own dist file

jobs:
  build-and-commit:
    name: Build Distribution Bundle and Commit Changes
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to allow pushing back to the repository
    steps:
      - name: Checkout Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Install PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Distribution Bundle
        run: pnpm run build

      - name: Commit and Push Changes
        run: |
          # Configure Git Bot
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Check if out/main/index.js has actual differences
          if ! git diff --exit-code out/main/index.js; then
            git add out/main/index.js
            git commit -m "chore: automated build optimization for compiled distribution"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No compiled changes detected. Skipping commit."
          fi